<!DOCTYPE html>
<html>
<head>
    <title>Video Test</title>
</head>
<body>
    <h1>Video Test Page</h1>
    
    <h2>Video 1: 12_Am_Birthda_Gungun.mp4</h2>
    <video controls width="400">
        <source src="12_Am_Birthda_Gungun.mp4" type="video/mp4">
        Your browser does not support the video tag.
    </video>
    
    <h2>Video 2: gift_special_video.mp4</h2>
    <video controls width="400">
        <source src="gift_special_video.mp4" type="video/mp4">
        Your browser does not support the video tag.
    </video>
    
    <script>
        // Check if videos can load
        document.addEventListener('DOMContentLoaded', function() {
            const videos = document.querySelectorAll('video');
            videos.forEach((video, index) => {
                video.addEventListener('error', function(e) {
                    console.error(`Video ${index + 1} error:`, e);
                    console.error('Error code:', video.error ? video.error.code : 'Unknown');
                });
                video.addEventListener('loadeddata', function() {
                    console.log(`Video ${index + 1} loaded successfully`);
                });
            });
        });
    </script>
</body>
</html>
